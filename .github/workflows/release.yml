name: Publish Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Validate JSON
        run: jq empty themes/robs-theme-color-theme.json

      - name: Package extension
        run: npx --yes @vscode/vsce package

      - name: Upload VSIX to release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: robs-theme-vsix
          path: "*.vsix"

      - name: Attach VSIX to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VSIX=$(ls *.vsix)
          gh release upload --repo "$GITHUB_REPOSITORY" "${{ github.event.release.tag_name }}" "$VSIX"
